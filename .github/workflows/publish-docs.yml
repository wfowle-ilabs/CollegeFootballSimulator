name: Publish docs

# Renders the Quarto site in /docs and deploys it to the gh-pages branch.
# After the first successful run, enable Pages in repo Settings → Pages → Source: "gh-pages".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
